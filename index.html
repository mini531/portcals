<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 프로토타입 - 항만기술기준 정보시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 640px; width: 100%; padding: 60px 40px; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
  .logo { margin-bottom: 32px; }
  .logo img { height: 48px; }
  h1 { font-size: 28px; font-weight: 700; color: #2c3e50; margin-bottom: 12px; }
  .desc { font-size: 15px; color: #6c7a89; line-height: 1.7; margin-bottom: 40px; }
  .link-group { text-align: left; }
  .link-group h3 { font-size: 13px; font-weight: 500; color: #95a5a6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #ecf0f1; }
  .link-item { display: flex; align-items: center; padding: 14px 16px; margin-bottom: 8px; background: #f8fafb; border: 1px solid #e8edf1; border-radius: 8px; text-decoration: none; color: #2c3e50; transition: all 0.2s; }
  .link-item:hover { background: #eef6f0; border-color: #5cb85c; transform: translateX(4px); }
  .link-item .category { font-size: 12px; color: #95a5a6; min-width: 100px; }
  .link-item .name { font-size: 15px; font-weight: 500; flex: 1; }
  .link-item .arrow { color: #bdc3c7; font-size: 18px; }
  .footer { margin-top: 36px; font-size: 12px; color: #bdc3c7; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <img src="/images/kpcs/w_logo.png" alt="항만기술기준 정보시스템">
  </div>
  <h1>HTML 프로토타입</h1>
  <p class="desc">
    화면 설계 공유를 위한 정적 HTML 페이지입니다.<br>
    기존 서비스의 일부 기능을 변경하고 UI를 검토하기 위해 제작되었습니다.<br>
    아래 링크를 통해 각 화면을 확인할 수 있습니다.
  </p>

  <div class="link-group">
    <h3>Pages</h3>
    <a class="link-item" href="/cost/selectStdMrpOrgListVw.do" target="_blank">
      <span class="category">공사비 정보</span>
      <span class="name">표준시장단가 원문</span>
      <span class="arrow">&rsaquo;</span>
    </a>
    <a class="link-item" href="/mng/std/selectStdListVw.do" target="_blank">
      <span class="category">관리</span>
      <span class="name">표준시장단가 관리</span>
      <span class="arrow">&rsaquo;</span>
    </a>
  </div>

  <div class="footer">
    Korea Ports &amp; Harbours Association
  </div>
</div>
</body>
</html>
